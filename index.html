<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Poems | Gaurab</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  
  <!-- Add preload for critical images -->
  <link rel="preload" href="images/poem-header.jpg" as="image">
</head>
<body>
  <header class="navbar">
    <nav>
      <a href="/" class="home-button">Home</a>
    </nav>
  </header>

  <div class="poems-header">
    <h1>Poetry Collection</h1>
    <div class="underline"></div>
    <p class="poems-description">
      Journey through emotions, experiences, and moments captured in verses. 
      Each poem tells a unique story, reflecting different aspects of life and love.
    </p>

    <div class="category-dropdown">
      <select id="poem-category">
        <option value="all">All Poems</option>
        <option value="nature">Nature</option>
        <option value="love">Love</option>
        <option value="life">Life</option>
      </select>
    </div>
  </div>

  <div class="poems-wrapper">
    <div class="poems-grid">

      <a href="/poems/notitle.html" class="poem-card" data-category="love">
        <span class="poem-category">Love</span>
        <img src="images/poem-header.jpg" alt="First Love" loading="lazy">
        <div class="poem-card-content">
          <h2 class="poem-title">.......</h2>
          <p class="poem-description">A tender memory etched in time</p>
        </div>
      </a>


      <!-- this is last wapper and grid  -->
    </div>
  </div>
  <footer class="navbar">
    <div class="footer-content">
      <p>&copy; 2025 Gaurab. All rights reserved.</p>
    </div>
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      function filterPoems(category) {
        const poems = document.querySelectorAll('.poem-card');
        poems.forEach(poem => {
          if (category === 'all' || poem.dataset.category === category) {
            poem.style.display = 'block';
          } else {
            poem.style.display = 'none';
          }
        });
      }

      const categorySelect = document.getElementById('poem-category');
      if (categorySelect) {
        categorySelect.addEventListener('change', function() {
          filterPoems(this.value);
        });
      }

      // Initialize with all poems showing
      filterPoems('all');
    });
  </script>
</body>
</html>
